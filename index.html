<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Game Portal</title>

  <style>
    /* =============================================
       RESET & VARIÁVEIS GLOBAIS
    ============================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Paleta principal — altere aqui para mudar todo o tema */
      --bg-page:    #0f172a;  /* fundo da página */
      --bg-card:    #1e293b;  /* fundo dos cards */
      --neon:       #38bdf8;  /* cor neon azul (bordas e brilho) */
      --neon-glow:  rgba(56, 189, 248, 0.45);
      --text-main:  #e2e8f0;
      --text-muted: #94a3b8;
      --header-h:   60px;     /* altura do cabeçalho no overlay */
    }

    body {
      background-color: var(--bg-page);
      color: var(--text-main);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* =============================================
       CABEÇALHO PRINCIPAL
    ============================================= */
    header {
      text-align: center;
      padding: 2.5rem 1rem 1rem;
    }

    header .logo {
      font-size: 1.1rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--neon);
      opacity: .7;
    }

    header h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      margin: .4rem 0 .6rem;
    }

    header p {
      font-size: .9rem;
      color: var(--text-muted);
    }

    /* =============================================
       BARRA DE PESQUISA
    ============================================= */
    .search-wrap {
      display: flex;
      justify-content: center;
      padding: 1.5rem 1rem .5rem;
    }

    #search {
      width: min(400px, 100%);
      padding: .6rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--neon);
      background: var(--bg-card);
      color: var(--text-main);
      font-size: .95rem;
      outline: none;
      transition: box-shadow .2s;
    }

    #search:focus {
      box-shadow: 0 0 0 3px var(--neon-glow);
    }

    #search::placeholder { color: var(--text-muted); }

    /* =============================================
       GRADE DE JOGOS (responsiva)
       Mínimo de 140px por card, máximo auto
    ============================================= */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1.25rem;
      padding: 1.5rem clamp(1rem, 4vw, 3rem) 3rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* =============================================
       CARD DE JOGO
    ============================================= */
    .card {
      background: var(--bg-card);
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 1.4rem .8rem 1.1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .55rem;
      cursor: pointer;
      transition: border-color .25s, box-shadow .25s, transform .2s;
      user-select: none;
    }

    /* Efeito de brilho neon ao passar o mouse */
    .card:hover {
      border-color: var(--neon);
      box-shadow: 0 0 16px var(--neon-glow), 0 0 40px rgba(56,189,248,.15);
      transform: translateY(-4px);
    }

    .card:active {
      transform: translateY(-2px);
    }

    .card .emoji {
      font-size: 2.8rem;
      line-height: 1;
    }

    .card .title {
      font-size: .82rem;
      font-weight: 600;
      text-align: center;
      color: var(--text-main);
    }

    /* Card visualmente escondido (filtro de busca) */
    .card[hidden] { display: none; }

    /* Mensagem "nenhum resultado" */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--text-muted);
      padding: 2rem 0;
      display: none;
    }

    /* =============================================
       OVERLAY DO JOGO (iframe tela cheia)
    ============================================= */
    #overlay {
      display: none;          /* escondido por padrão */
      position: fixed;
      inset: 0;
      z-index: 9999;
      flex-direction: column;
      background: #000;
    }

    /* Quando um jogo está aberto o overlay fica visível */
    #overlay.active {
      display: flex;
    }

    /* Barra superior do overlay */
    #overlay-bar {
      height: var(--header-h);
      background: #0d1117;
      border-bottom: 1px solid var(--neon);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      flex-shrink: 0;
    }

    #overlay-bar .game-name {
      font-size: .95rem;
      font-weight: 600;
      color: var(--neon);
    }

    /* Botão "← Voltar ao Menu" */
    #btn-back {
      background: transparent;
      border: 1px solid var(--neon);
      color: var(--neon);
      padding: .35rem .9rem;
      border-radius: 6px;
      font-size: .85rem;
      cursor: pointer;
      transition: background .2s, box-shadow .2s;
    }

    #btn-back:hover {
      background: var(--neon-glow);
      box-shadow: 0 0 8px var(--neon-glow);
    }

    /* O iframe ocupa todo o espaço restante abaixo da barra */
    #game-frame {
      flex: 1;
      width: 100%;
      border: none;
    }

    /* =============================================
       FOOTER
    ============================================= */
    footer {
      text-align: center;
      padding: 1rem;
      font-size: .75rem;
      color: var(--text-muted);
      border-top: 1px solid #1e293b;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">🎮 Game Portal</div>
    <h1>Game Portal</h1>
    <p>Selecione um jogo e divirta-se</p>
  </header>

  <!-- Caixa de pesquisa -->
  <div class="search-wrap">
    <input
      id="search"

       Para adicionar um jogo, copie um bloco .card

  <main class="grid" id="grid">

    </div>

    <!-- JOGO 2 — Among Us -->

      <span class="title">Among Us</span>

    >
      <span class="emoji">🎯</span>
      <span class="title">Venge.io</span>
    </div>

    <!-- JOGO 4 — 1v1.LOL -->

      class="card"

    </div>

    <!-- JOGO 5 — Retro Bowl -->
    <div
      class="card"
      data-title="Retro Bowl"

      tabindex="0"

    >
      <span class="emoji">🏈</span>
      <span class="title">Retro Bowl</span>
    </div>

    <!-- JOGO 6 — Slope -->
    <!-- URL: jogo de bola descendo rampa infinita -->

    </div>

    <!-- JOGO 8 — Krunker.io -->

    <!-- JOGO 11 — Zombs Royale -->

    <div

      data-title="Zombs Royale"

    <!-- JOGO 14 — Diep.io -->
    <!-- URL: tanques evoluindo multiplayer -->

      aria-label="Abrir Diep.io"

    <!-- JOGO 15 — Wormate.io -->

    <div
      class="card"
      data-title="Wormate.io"

      role="button"
      tabindex="0"
      aria-label="Abrir Wormate.io"
    >

    <!-- Mensagem de "sem resultados" para o filtro de busca -->

  </main>

  <!-- =============================================
       OVERLAY DO JOGO (tela cheia com iframe)
       O jogo abre aqui ao clicar em um card
  ============================================= -->
  <div id="overlay" role="dialog" aria-modal="true" aria-label="Janela do jogo">

    <!-- Barra superior -->
    <div id="overlay-bar">
      <span class="game-name" id="overlay-title">Jogo</span>
      <button id="btn-back" aria-label="Voltar ao menu">← Voltar ao Menu</button>
    </div>

    <!-- Iframe onde o jogo é carregado -->
    <iframe
      id="game-frame"
      src="about:blank"
      title="Jogo"
      allow="fullscreen; autoplay"
      allowfullscreen
    ></iframe>

  </div>

  <!-- =============================================
       FOOTER
  ============================================= -->
  <footer>
    &copy; 2024 Game Portal
  </footer>

  <!-- =============================================
       JAVASCRIPT
  ============================================= -->
  <script>
    /* -----------------------------------------------
       ELEMENTOS DO DOM
    ----------------------------------------------- */
    const overlay     = document.getElementById('overlay');
    const gameFrame   = document.getElementById('game-frame');
    const overlayTitle = document.getElementById('overlay-title');
    const btnBack     = document.getElementById('btn-back');
    const searchInput = document.getElementById('search');
    const cards       = document.querySelectorAll('.card');
    const noResults   = document.getElementById('no-results');

    /* -----------------------------------------------
       ABRIR JOGO
       Recebe o elemento .card clicado,
       preenche o iframe e exibe o overlay
    ----------------------------------------------- */
    function openGame(card) {
      const url   = card.dataset.url;
      const title = card.dataset.title;

      overlayTitle.textContent = title;    // mostra o nome do jogo na barra
      gameFrame.src = url;                 // carrega o jogo no iframe

      overlay.classList.add('active');     // exibe o overlay

      /* Trava o scroll da página principal enquanto o jogo está aberto */
      document.body.style.overflow = 'hidden';
    }

    /* -----------------------------------------------
       FECHAR JOGO
       Remove o iframe e reabilita o scroll
    ----------------------------------------------- */
    function closeGame() {
      overlay.classList.remove('active'); // esconde o overlay
      gameFrame.src = 'about:blank';      // descarrega o jogo (libera memória)
      document.body.style.overflow = '';  // restaura o scroll
    }

    /* -----------------------------------------------
       EVENTOS DOS CARDS
       Suporte a clique e teclado (Enter/Espaço)
       para acessibilidade
    ----------------------------------------------- */
    cards.forEach(card => {
      card.addEventListener('click', () => openGame(card));

      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          openGame(card);
        }
      });
    });

    /* Botão de voltar ao menu */
    btnBack.addEventListener('click', closeGame);

    /* Fechar com a tecla Escape */
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && overlay.classList.contains('active')) {
        closeGame();
      }
    });

    /* -----------------------------------------------
       FILTRO DE BUSCA
       Oculta cards cujo título não bate com o texto
    ----------------------------------------------- */
    searchInput.addEventListener('input', () => {
      const query = searchInput.value.trim().toLowerCase();
      let visible = 0;

      cards.forEach(card => {
        const title = card.dataset.title.toLowerCase();
        if (title.includes(query)) {
          card.removeAttribute('hidden');
          visible++;
        } else {
          card.setAttribute('hidden', '');
        }
      });

      /* Mostra a mensagem de "sem resultados" se necessário */
      noResults.style.display = visible === 0 ? 'block' : 'none';
    });
  </script>

</body>
</html>
