<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Portal</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:   #0f172a;
      --bg-card:   #1e293b;
      --neon:      #38bdf8;
      --neon-glow: rgba(56, 189, 248, 0.45);
      --text-main: #e2e8f0;
      --text-muted:#94a3b8;
      --header-h:  60px;
    }

    body {
      background-color: var(--bg-page);
      color: var(--text-main);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* CABEÇALHO */
    header { text-align: center; padding: 2.5rem 1rem 1rem; }
    header .logo { font-size: 1.1rem; letter-spacing: .25em; text-transform: uppercase; color: var(--neon); opacity: .7; }
    header h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 700; margin: .4rem 0 .6rem; }
    header p { font-size: .9rem; color: var(--text-muted); }

    /* BUSCA */
    .search-wrap { display: flex; justify-content: center; padding: 1.5rem 1rem .5rem; }
    #search {
      width: min(400px, 100%); padding: .6rem 1rem; border-radius: 8px;
      border: 1px solid var(--neon); background: var(--bg-card);
      color: var(--text-main); font-size: .95rem; outline: none; transition: box-shadow .2s;
    }
    #search:focus { box-shadow: 0 0 0 3px var(--neon-glow); }
    #search::placeholder { color: var(--text-muted); }

    /* GRADE */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1.25rem;
      padding: 1.5rem clamp(1rem, 4vw, 3rem) 3rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* CARD — edite onclick="play('URL')" para trocar o jogo */
    .card {
      background: var(--bg-card);
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 1.4rem .8rem 1.1rem;
      display: flex; flex-direction: column; align-items: center; gap: .55rem;
      cursor: pointer;
      transition: border-color .25s, box-shadow .25s, transform .2s;
      user-select: none;
    }
    .card:hover {
      border-color: var(--neon);
      box-shadow: 0 0 16px var(--neon-glow), 0 0 40px rgba(56,189,248,.15);
      transform: translateY(-4px);
    }
    .card:active { transform: translateY(-2px); }
    .card .emoji { font-size: 2.8rem; line-height: 1; }
    .card .title { font-size: .82rem; font-weight: 600; text-align: center; }
    .card[hidden] { display: none; }

    .no-results { grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 2rem 0; display: none; }

    /* OVERLAY */
    #overlay { display: none; position: fixed; inset: 0; z-index: 9999; flex-direction: column; background: #000; }
    #overlay.active { display: flex; }
    #overlay-bar {
      height: var(--header-h); background: #0d1117; border-bottom: 1px solid var(--neon);
      display: flex; align-items: center; justify-content: space-between; padding: 0 1rem; flex-shrink: 0;
    }
    #overlay-bar .game-name { font-size: .95rem; font-weight: 600; color: var(--neon); }
    #btn-back {
      background: transparent; border: 1px solid var(--neon); color: var(--neon);
      padding: .35rem .9rem; border-radius: 6px; font-size: .85rem; cursor: pointer;
      transition: background .2s, box-shadow .2s;
    }
    #btn-back:hover { background: var(--neon-glow); box-shadow: 0 0 8px var(--neon-glow); }
    #game-frame { flex: 1; width: 100%; border: none; }

    footer { text-align: center; padding: 1rem; font-size: .75rem; color: var(--text-muted); border-top: 1px solid #1e293b; }
  </style>
</head>
<body>

  <header>
    <div class="logo">🎮 Game Portal</div>
    <h1>Game Portal</h1>
    <p>Selecione um jogo e divirta-se</p>
  </header>

  <div class="search-wrap">
    <input id="search" type="search" placeholder="Pesquisar jogo..." autocomplete="off" aria-label="Pesquisar jogo" />
  </div>

  <!-- =============================================
       GRADE DE JOGOS
       Para adicionar: copie um .card e edite:
         onclick="play('URL_DO_JOGO')"
         data-title="Nome do Jogo"
         emoji e .title
  ============================================= -->
  <main class="grid" id="grid">

    <!-- JOGO 1 — Minecraft -->
    <div class="card" onclick="play('https://eaglercraft.com/mc/1.8.8/', 'Minecraft')" data-title="Minecraft">
      <span class="emoji">⛏️</span>
      <span class="title">Minecraft</span>
    </div>

    <!-- JOGO 2 — Among Us -->
    <div class="card" onclick="play('https://www.miniplay.com/embed/among-us-online', 'Among Us')" data-title="Among Us">
      <span class="emoji">🚀</span>
      <span class="title">Among Us</span>
    </div>

    <!-- JOGO 3 — Venge.io -->
    <div class="card" onclick="play('https://venge.io', 'Venge.io')" data-title="Venge.io">
      <span class="emoji">🎯</span>
      <span class="title">Venge.io</span>
    </div>

    <!-- JOGO 4 — 1v1.LOL -->
    <div class="card" onclick="play('https://1v1.lol', '1v1.LOL')" data-title="1v1.LOL">
      <span class="emoji">🏗️</span>
      <span class="title">1v1.LOL</span>
    </div>

    <!-- JOGO 5 — Retro Bowl -->
    <div class="card" onclick="play('https://ozogames.com/uploads/games/html5/G/granny%20unblocked%20game/index.html', 'Granny')" data-title="Retro Bowl">
      <span class="emoji">🏈</span>
      <span class="title">Granny</span>
    </div>

    <!-- JOGO 6 — Slope -->
    <div class="card" onclick="play('https://slope-game.com', 'Slope')" data-title="Slope">
      <span class="emoji">🎳</span>
      <span class="title">Slope</span>
    </div>

    <!-- JOGO 7 — Shell Shockers -->
    <div class="card" onclick="play('https://shellshock.io', 'Shell Shockers')" data-title="Shell Shockers">
      <span class="emoji">🥚</span>
      <span class="title">Shell Shockers</span>
    </div>

    <!-- JOGO 8 — Krunker.io -->
    <div class="card" onclick="play('https://krunker.io', 'Krunker.io')" data-title="Krunker.io">
      <span class="emoji">🔫</span>
      <span class="title">Krunker.io</span>
    </div>

    <!-- JOGO 9 — Agar.io -->
    <div class="card" onclick="play('https://agar.io', 'Agar.io')" data-title="Agar.io">
      <span class="emoji">🟢</span>
      <span class="title">Agar.io</span>
    </div>

    <!-- JOGO 10 — Slither.io -->
    <div class="card" onclick="play('https://slither.io', 'Slither.io')" data-title="Slither.io">
      <span class="emoji">🐍</span>
      <span class="title">Slither.io</span>
    </div>

    <!-- JOGO 11 — Zombs Royale -->
    <div class="card" onclick="play('https://zombsroyale.io', 'Zombs Royale')" data-title="Zombs Royale">
      <span class="emoji">🧟</span>
      <span class="title">Zombs Royale</span>
    </div>

    <!-- JOGO 12 — Paper.io 2 -->
    <div class="card" onclick="play('https://paper-io.com', 'Paper.io 2')" data-title="Paper.io 2">
      <span class="emoji">📄</span>
      <span class="title">Paper.io 2</span>
    </div>

    <!-- JOGO 13 — Surviv.io -->
    <div class="card" onclick="play('https://surviv.io', 'Surviv.io')" data-title="Surviv.io">
      <span class="emoji">🪖</span>
      <span class="title">Surviv.io</span>
    </div>

    <!-- JOGO 14 — Diep.io -->
    <div class="card" onclick="play('https://diep.io', 'Diep.io')" data-title="Diep.io">
      <span class="emoji">🔵</span>
      <span class="title">Diep.io</span>
    </div>

    <!-- JOGO 15 — Wormate.io -->
    <div class="card" onclick="play('https://wormate.io', 'Wormate.io')" data-title="Wormate.io">
      <span class="emoji">🍭</span>
      <span class="title">Wormate.io</span>
    </div>

    <p class="no-results" id="no-results">Nenhum jogo encontrado.</p>
  </main>

  <!-- OVERLAY -->
  <div id="overlay" role="dialog" aria-modal="true" aria-label="Janela do jogo">
    <div id="overlay-bar">
      <span class="game-name" id="overlay-title">Jogo</span>
      <button id="btn-back" aria-label="Voltar ao menu">← Voltar ao Menu</button>
    </div>
    <iframe id="game-frame" src="about:blank" title="Jogo" allow="fullscreen; autoplay" allowfullscreen></iframe>
  </div>

  <footer>&copy; 2024 Game Portal</footer>

  <script>
    const overlay      = document.getElementById('overlay');
    const gameFrame    = document.getElementById('game-frame');
    const overlayTitle = document.getElementById('overlay-title');
    const searchInput  = document.getElementById('search');
    const noResults    = document.getElementById('no-results');

    /* Função global chamada pelo onclick de cada card */
    function play(url, title) {
      overlayTitle.textContent = title;
      gameFrame.src = url;
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    /* Fechar overlay */
    function closeGame() {
      overlay.classList.remove('active');
      gameFrame.src = 'about:blank';
      document.body.style.overflow = '';
    }

    document.getElementById('btn-back').addEventListener('click', closeGame);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && overlay.classList.contains('active')) closeGame();
    });

    /* Filtro de busca pelo data-title */
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      let visible = 0;
      document.querySelectorAll('.card').forEach(card => {
        const match = card.dataset.title.toLowerCase().includes(q);
        card.toggleAttribute('hidden', !match);
        if (match) visible++;
      });
      noResults.style.display = visible === 0 ? 'block' : 'none';
    });
  </script>

</body>
</html>
